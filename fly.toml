# fly.toml — PoisonedFinance API
# App name: poisonedfinance-api
# Generated for Fly.io free tier (1 shared-cpu-1x, 256 MB)
# Secrets (DATABASE_URL, ENCRYPTION_KEY, ANTHROPIC_API_KEY, TRUELAYER_*)
# must be set via `fly secrets set` — see Task 5.

app = "poisonedfinance-api"
primary_region = "lhr"

[build]
  # Fly.io builds from the Dockerfile at api/Dockerfile.
  # Use --dockerfile flag on first deploy (see Task 7).
  dockerfile = "api/Dockerfile"
  # Build context is the api/ subdirectory so all COPY paths are relative to it.
  build_target = "runtime"

[deploy]
  # Runs BEFORE traffic shifts to the new release (contracts §11).
  # Executes pending SQL migrations then exits 0 (success) or 1 (failure).
  # A non-zero exit aborts the deploy, keeping the previous release live.
  release_command = "node dist/db/migrate-cli.js"

[env]
  # Non-secret runtime config — safe to commit.
  PORT = "3000"
  NODE_ENV = "production"
  TRUELAYER_REDIRECT_URI = "https://poisonedfinance-api.fly.dev/auth/callback"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
