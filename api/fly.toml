app = "poisonedfinance-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "node dist/db/migrate-cli.js"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  TRUELAYER_REDIRECT_URI = "https://poisonedfinance-api.fly.dev/auth/callback"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
